<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publier un Poster</title>
</head>
<body>
    <header style="text-align: center; padding: 1rem; background-color: #4CAF50; color: white;">
        <h1>Publier un Poster</h1>
    </header>
    <div style="max-width: 800px; margin: 2rem auto; font-family: Arial, sans-serif;">
        <form action="/upload" method="post" enctype="multipart/form-data">
            <label for="file">Choisir un fichier :</label>
            <input type="file" name="file" id="file" required>
            <button type="submit" style="margin-top: 1rem;">Uploader</button>
        </form>
        <a href="/" style="text-decoration: none; color: #4CAF50; margin-top: 1rem; display: block;">Retour à l'accueil</a>
    </div>
</body>
</html>
